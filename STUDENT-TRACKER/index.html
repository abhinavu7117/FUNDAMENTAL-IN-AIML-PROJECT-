<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
    <h1>📊 Smart Study Dashboard</h1>
    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter task..." onkeypress="if(event.key==='Enter') addTask()">
        <input type="date" id="deadline">
        <select id="category">
            <option value="Study">Study</option>
            <option value="Assignment">Assignment</option>
            <option value="Personal">Personal</option>
        </select>
        <button onclick="addTask()">Add</button>
    </div>
    <div class="stats">
        <p>Total: <span id="totalTasks">0</span></p>
        <p>Done: <span id="completedTasks">0</span></p>
    </div>
    <div class="progress-bar">
        <div id="progress"></div>
    </div>
    <canvas id="taskChart"></canvas>
    <ul id="taskList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
